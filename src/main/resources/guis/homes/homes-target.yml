# - true = /home @p opens the GUI
# - false = runs /home @p logic with usage messages instead
enabled: true

# - true = opens the GUI even if the target has no homes set
# - false = sends the 'no homes' error message and prevents the GUI from opening
allow-empty-gui: true

# - true = buttons next/previous-page are always shown
# - false = buttons next/previous-page only appear when available
always-show-buttons: false

# GUI title and size
title: "<gradient:#00ffcc:#0066ff>%target%'s Homes</gradient> - Page %page%/%pages%"
rows: 5

# Dynamic slot groups
# These define where the target's home slots will be placed
home-slots: [10-16, 19-25, 28-34]

# Home Item Configuration
home-item:
  # Default item if no world type is found
  material: LIME_DYE
  glow: true
  display-name: "<#5efce8><bold>%name%</bold></#5efce8>"
  lore:
    - "<dark_gray>%target%'s Waypoint</dark_gray>"
    - ""
    - "<gray>Location Details:</gray>"
    - " <#736efe>»</#736efe> <gray>World:</gray> <white>%world%</white>"
    - " <#736efe>»</#736efe> <gray>Coords:</gray> <white>%x%, %y%, %z%</white>"
    - " <#736efe>»</#736efe> <gray>Created at:</gray> <white>%time% %date%</white>"
    - ""
    - "<#5efce8>Click</#5efce8> <gray>to teleport to this home</gray>"
    # This line will appear if player has aircore.command.delhome.others
    - "delhome: <#ff5f6d>Shift-Click</#ff5f6d> <gray>to delete this home</gray>"
  actions:
    - "[sound] entity.enderman.teleport 1 1.2"
    - "[teleport]"
  shift-actions:
    - "[sound] entity.enderman.teleport 1 1.2"
    - "[delete]"
  apply-confirm:
    teleport:
      enabled: false
    delete:
      enabled: true
  # If world match, item components will override default home-item components
  world-types:
    world:
      material: GRASS_BLOCK
      display-name: "<green>Overworld | <#5efce8><bold>%name%</bold></#5efce8>"
    world_nether:
      material: NETHERRACK
      display-name: "<red>Nether | <#5efce8><bold>%name%</bold></#5efce8>"
    world_the_end:
      material: END_STONE
      display-name: "<blue>The End | <#5efce8><bold>%name%</bold></#5efce8>"
    # my_world:
    #  material: BEACON
    #  display-name: "<rainbow><bold>%name%</bold></rainbow>"

# Slot Available Item (based on home limit permission)
# Only updates correctly if the player is online. For offline players it'll use default home limit
# Recommended to keep this disabled to avoid inconsistency
slot-available:
  enabled: false
  material: LIME_STAINED_GLASS_PANE
  display-name: "<#5efce8><bold>Available Home Slot</bold></#5efce8>"
  lore:
    - "<gray>%target% has permission to use</gray>"
    - "<gray>this slot for a new home.</gray>"
    - ""
    - " <#736efe>»</#736efe> <gray>Status:</gray> <green>Unlocked</green>"

# GUI buttons
# Special items with fixed actions in the GUI.
# You can customize their appearance (glow, enchants, tooltips, actions, etc.).
buttons:
  next-page:
    slots: [26]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Next Page</#5efce8>"
    lore:
      - "<gray>View more of %target%'s homes</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.125

  previous-page:
    slots: [18]
    material: SPECTRAL_ARROW
    display-name: "<#5efce8>Previous Page</#5efce8>"
    lore:
      - "<gray>Go back a page</gray>"
    actions:
      - "[sound] ui.button.click 1 1.2"
    cooldown: 0.125

  sort-by:
    slots: [39]
    material: HOPPER
    display-name: "<gradient:#5efce8:#736efe><bold>Sort Interface</bold></gradient>"
    lore:
      - "<gray>Current sorting method:</gray>"
      - ""
      - "%sort%"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to cycle through modes</gray>"
    actions:
      - "[sound] ui.button.click 1.0 1.5"
    cooldown: 0.125
    # False for single line, true for the vertical list
    show-list: true
    # Formatting for the %sort% placeholder
    format:
      selected: "<#5efce8>⏵ %name%</#5efce8>"
      unselected: "<dark_gray>  %name%</dark_gray>"
    # To remove a sort, just delete its entry from this list.
    types:
      # The order defined here will determine the order they appear in the cycle
      latest: "Latest Created"
      oldest: "Oldest Created"
      alphabetical: "Name (A-Z)"

  filter-by:
    slots: [41]
    material: COMPARATOR
    display-name: "<gradient:#5efce8:#736efe><bold>Filter Interface</bold></gradient>"
    lore:
      - "<gray>Current filter world:</gray>"
      - ""
      - "%filter%"
      - ""
      - "<#5efce8>Click</#5efce8> <gray>to cycle through worlds</gray>"
    actions:
      - "[sound] ui.button.click 1.0 1.5"
    cooldown: 0.125
    # False for single line, true for the vertical list
    show-list: true
    # Formatting & Conditions for the %filter% placeholder
    format:
      selected: "<#5efce8>⏵ %name%</#5efce8>"
      unselected: "<dark_gray>  %name%</dark_gray>"
    # To remove a filter, just delete its entry from this list.
    types:
      # The order defined here will determine the order they appear in the cycle
      all: "All"
      world: "Overworld"
      world_nether: "Nether"
      world_the_end: "The End"
      # my_world: "My World"

# Custom items
items:
  filler:
    slots: [0-9, 17, 27, 35-38, 40, 42-43]
    material: GRAY_STAINED_GLASS_PANE
    hide-tooltip: true

  blocked-slot:
    slots: [10-16, 19-25, 28-34]
    material: BARRIER
    display-name: "<#ff5f6d><bold>Empty Slot</bold></#ff5f6d>"
    lore:
      - "<gray>%target% didn't set a home in</gray>"
      - "<gray>this slot yet.</gray>"
      - ""
      - " <#736efe>»</#736efe> <gray>Status:</gray> <red>Empty</red>"

  player-head:
    slots: [44]
    material: head-%target%
    display-name: "<gray>Player</gray> <#736efe>»</#736efe> <white>%target%</white>"

  no-next-page:
    slots: [26]
    material: ARROW
    display-name: "<dark_gray>Next Page</dark_gray>"
    lore:
      - "<red>End of %target%'s homes</red>"

  no-previous-page:
    slots: [18]
    material: ARROW
    display-name: "<dark_gray>Previous Page</dark_gray>"
    lore:
      - "<red>First page</red>"