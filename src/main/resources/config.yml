# -------------------------------------------------------------------
# AirCore Configuration
# -------------------------------------------------------------------

# -------------------------------------------------------------------
# GENERAL SETTINGS
# -------------------------------------------------------------------
notify-updates: true               # Notify admins when there is a new update
lang: "en_US"                      # Locale file name (lang/messages/KEY.yml)
console-to-player-feedback: true   # Send feedback to players when console runs commands targeting them
error-on-excess-args: true         # Show error message if too many arguments are provided

# Time formatting used across the plugin and in placeholders
time-format:
  # Modes: DETAILED | SEQUENTIAL | CUSTOM
  # DETAILED   - Show all units ("2 days 3 hours 4 minutes")
  # SEQUENTIAL - Show one unit at a time
  # CUSTOM     - Show up to 'granularity' units
  mode: DETAILED
  granularity: 2                   # Only used when mode = CUSTOM (1 = largest, 4 = full)

# Date formatting used for GUIs
# Patterns: dd/MM/yy, dd MMM, MMMM dd, yyyy, E, dd MMM
date-format: "dd/MM/yy"

# -------------------------------------------------------------------
# CHAT SETTINGS
# -------------------------------------------------------------------
chat:
  chat-cooldown: 3                 # Seconds between messages (0 = disabled)

  # Group formatting (requires LuckPerms)
  group-format:
    enabled: true
    # _DEFAULT_ used when no group matches
    formats:
      _DEFAULT_: "<gray>%player%</gray> <dark_gray>></dark_gray> <white>%message%</white>"
      owner: "<dark_red><bold>OWNER</bold></dark_red> <red>%player%</red> <dark_gray>></dark_gray> <white>%message%</white>"
      vip: "<dark_green><bold>VIP</bold></dark_green> <green>%player%</green> <dark_gray>></dark_gray> <white>%message%</white>"
      custom: "<dark_gray>[%player_ping%ms] %luckperms_prefix% <yellow>%player%</yellow> <dark_gray>></dark_gray> <gold>%message%</gold>"

  # Link detection and formatting
  url-formatting:
    enabled: true
    format: "<gold><click:open_url:'%link%'><hover:show_text:'<gray>Click to open:</gray> <gold>%link%</gold>'>%link%</hover></click></gold>"

  # Mentions (@player)
  chat-mentions:
    enabled: true
    format: "<gold>@%player%</gold>"
    allow-self-mention: false
    case-sensitive: false
    sound:
      name: "entity.experience_orb.pickup"
      volume: 0.8
      pitch: 2.0
    # Alerts shown to the mentioned player
    title:
      text: "<gold><bold>Mentioned!</bold></gold>"
      fade-in: 10
      stay: 40
      fade-out: 10
    subtitle:
      text: "<yellow>%player% mentioned you in chat!</yellow>"
    actionbar:
      text: "<yellow>%player% mentioned you in chat!</yellow>"

  # Display tags (Replacement placeholders)
  display-tags:
    show-item:
      enabled: true
      keys:
        - "[i]"
        - "[item]"
      format: "<gold>[x%amount% %item%]</gold>"

    balance-tag:
      keys:
        - "[bal]"
        - "[balance]"
      format: "<gold><hover:show_text:'<green>$%aircore_player_balance_FORMATTED%</green>'>[%player%'s balance]</hover></gold>"

    playtime-tag:
      keys:
        - "[playtime]"
        - "[pt]"
      format: "<gold><hover:show_text:'<green>%statistic_hours_played% hours played</green>'>[%player%'s playtime]</hover></gold>"

  # Private message behavior
  allow-self-message: false         # Allow player to send private messages to self
  reply-expire-after: 60            # Seconds before /reply target expires (0 = never)
  apply-chat-cooldown: true         # Apply chat cooldown to /msg and /reply
  apply-url-formatting: true        # Detect & format URLs in private messages
  apply-display-tags: true          # Apply display tags inside private messages

# -------------------------------------------------------------------
# ECONOMY SETTINGS (Requires Vault)
# -------------------------------------------------------------------
economy:
  allow-decimals: true              # Allow non-integer balances (e.g., 12.5)
  number-format: FORMATTED          # SHORT (1k) | FORMATTED (1,000) | RAW (1000)
  format-short-suffix: ["", "k", "M", "B", "T", "Q"]
  allow-format-short-in-command: false
  allow-self-pay: false

  # Limits and defaults
  default-balance: 500
  min-balance: 0                    # -1 to disable
  max-balance: 1000000000           # -1 to disable
  min-pay-amount: 3                 # -1 to disable
  max-pay-amount: 1000000           # -1 to disable

# -------------------------------------------------------------------
# TELEPORTATION SETTINGS
# -------------------------------------------------------------------
teleport:
  teleport-to-center: true          # Center player on block upon arrival

  teleport-countdown:
    duration: 5                     # Seconds before execution (0 = instant)
    repeat-message: true            # Send countdown message every second

  cancel-teleport-when:
    move: true                      # Cancel on movement
    damage: true                    # Cancel on damage
    command: false                  # Cancel on command execution
    interact: false                 # Cancel on block interaction

  apply-immunity-after-teleport: 3  # Seconds of damage immunity after TP

  # Request handling (TPA)
  teleport-request-cooldown: 5      # Cooldown between requests to same player
  teleport-request-expire-time: 60  # Seconds until request expires
  retain-request-state-on-logout: true

  # World spawn behavior
  teleport-to-spawn-on-first-join: true
  teleport-to-spawn-on-join: false
  teleport-to-spawn-on-death: true

# -------------------------------------------------------------------
# HOMES & KITS
# -------------------------------------------------------------------
homes:
  max-homes: 3                      # Bypass: aircore.bypass.home.limit.<#>
  disabled-worlds:
    - "disabledworld"               # Worlds where /sethome is blocked

  allow-home-names: true            # Require players to name homes
  name-validation-regex: "^[A-Za-z0-9]+$"
  max-home-name-length: 16

kits:
  first-join-kit: ""                # Kit given on first join ("" = none)
  drop-items-when-full: false       # Drop items if inventory is full

# -------------------------------------------------------------------
# JOIN, LEAVE & DEATH MESSAGES
# -------------------------------------------------------------------
player-join-leave:
  # MOTD shown only on first join
  motd-first-join:
    - " "
    - "<green>Welcome <yellow>%player%</yellow> for the very first time!</green>"
    - "<gray>We're excited to have you here.</gray>"
    - " "

  # MOTD shown on every join (Per-group). _DEFAULT_ used when no group matches.
  motd-join:
    _DEFAULT_:
      - " "
      - "<green>Welcome back <yellow>%player%</yellow> to the server!</green>"
      - "<gray>Glad to see you again.</gray>"
      - " "

  # Global broadcasts
  broadcast-first-join: "<green>[+] <yellow>%player%</yellow> joined for the first time! Member <yellow>#%unique%</yellow>.</green>"

  broadcast-join:
    _DEFAULT_: "<green>[+] <yellow>%player%</yellow> joined the game.</green>"

  broadcast-leave:
    _DEFAULT_: "<red>[-] <yellow>%player%</yellow> left the game.</red>"

death-messages:
  enabled: true                     # If false, vanilla death messages are used
  disabled-worlds:
    - "disabledworld"

# -------------------------------------------------------------------
# MISC
# -------------------------------------------------------------------
max-blocks: 20                      # Max players a user can ignore/block.